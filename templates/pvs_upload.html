{% extends "master.html" %}

{% block content %}

<h2 class="mt-4">Pay-Slip Upload</h2>

<input type="file" id="slip" class="mb-2">
<button class="btn btn-primary" onclick="uploadSlip()">Upload</button>

<div id="loading" style="display:none; color: blue;" class="mt-2">Uploading and Reading slip...</div>

<hr>
<div id="result" class="mt-3"></div>
<h2 class="mt-4">Orders</h2>
<button class="btn btn-warning btn-lg mb-3" onclick="verifySlip()">Verify Slip</button>

<table border="1" id="orderTable" class="table table-bordered mb-5">
    <thead>
        <tr>
            <th>ID</th>
            <th>Order No</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="orderBody"></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
let ocrData = null;

async function uploadSlip() {
  let file = document.getElementById("slip").files[0]
  if (!file) {
      alert("กรุณาเลือกไฟล์รูปสลิปก่อนครับ");
      return;
  }

  let formData = new FormData()
  formData.append("file", file)

  document.getElementById("loading").style.display = "block"
  document.getElementById("result").innerHTML = ""

  let res = await fetch("/api/pvs/upload-ocr", {
    method: "POST",
    body: formData
  })

  ocrData = await res.json()

  document.getElementById("loading").style.display = "none"
  showResult(ocrData)
}

function showResult(data) {
  let html = `
    <div class="alert alert-success">
        <p><b>Amount (ยอดเงิน):</b> ${data.amount}</p>
        <p><b>DateTime (วันเวลา):</b> ${data.datetime}</p>
        <p><b>Raw Text (ข้อความที่ AI อ่านได้):</b> <br><small>${data.text}</small></p>
    </div>
  `
  document.getElementById("result").innerHTML = html
}




async function loadOrders() {
  const res = await fetch('/api/pvs/orders');
  const data = await res.json();
  const tbody = document.getElementById('orderBody');
  tbody.innerHTML = '';
  data.forEach(o => {
    tbody.innerHTML += `
      <tr>
        <td>${o.id}</td>
        <td>${o.order_no}</td>
        <td>${o.amount_total}</td>
        <td>${o.order_date}</td>
        <td>${o.state}</td>
      </tr>
    `;
  });
}


async function verifySlip() {
  if (!ocrData) {
    Swal.fire('Error', 'Please upload slip first', 'error');
    return;
  }

  const res = await fetch('/api/pvs/verify-slip', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(ocrData)
  });
  const orders = await res.json();
  showOrderPopup(orders);
}


function showOrderPopup(orders) {
  let html = '';
  orders.forEach(o => {
      html += `
        <div>
          <input type="checkbox" value="${o.id}" class="order-check">
          ${o.order_no} | ${o.amount_total} | ${o.order_date}
        </div>
      `;
  });

  Swal.fire({
    title: 'Select Orders',
    html: html,
    confirmButtonText: 'Confirm Payment',
    preConfirm: () => {
      const selected = [];
      document.querySelectorAll('.order-check:checked').forEach(el => {
        selected.push(parseInt(el.value));
      });
      return selected;
    }
  }).then(result => {
    if (result.isConfirmed) {
      markPaid(result.value);
    }
  });
}


async function markPaid(orderIds) {
  if (!orderIds || orderIds.length === 0) {
    Swal.fire('Error', 'No order selected', 'error');
    return;
  }

  const res = await fetch('/api/pvs/mark-paid', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ order_ids: orderIds })
  });
  const data = await res.json();
  Swal.fire('Success', 'Orders marked as paid', 'success');
  loadOrders();
}


loadOrders();
</script>
{% endblock %}

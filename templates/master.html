<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVS - Workshop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="#">PVS</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/products">Product</a></li>
                    <li class="nav-item"><a class="nav-link" href="/products/search">Product search</a></li>
                    <li class="nav-item"><a class="nav-link" href="/pvs/upload">upload</a></li>
                </ul>

                <div class="d-flex align-items-center">
                    {% if request.session.get('user') %}
                        <div class="navbar-text text-light me-3">
                            Welcome {{ request.session.get('user') }}
                        </div>
                        <a href="/logout" class="btn btn-danger">Logout</a>
                    {% else %}
                        <a href="/login" class="btn btn-info">Log in</a>
                    {% endif %}
                </div>
                </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
